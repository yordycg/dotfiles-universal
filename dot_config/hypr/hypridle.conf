# =============================================================================
# hypridle.conf — Gestión de Inactividad
# =============================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock    # No lanzar si ya está corriendo
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpmsoff && hyprctl dispatch dpmson
}

listener {
    timeout = 300                            # 5 minutos → apagar pantalla
    on-timeout = hyprctl dispatch dpmsoff
    on-resume   = hyprctl dispatch dpmson
}

listener {
    timeout = 360                            # 6 minutos → lockscreen
    on-timeout = loginctl lock-session
}

listener {
    timeout = 1800                           # 30 minutos → suspender
    on-timeout = systemctl suspend
}
