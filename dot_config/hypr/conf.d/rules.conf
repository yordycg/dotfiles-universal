# =============================================================================
# rules.conf — Reglas de Ventanas y Capas
# =============================================================================

# ── Ventanas flotantes por defecto (Herramientas de Sistema) ──────────────────
windowrulev2 = float, class:.*pavucontrol.*
windowrulev2 = float, class:.*blueman-manager.*
windowrulev2 = float, class:.*nm-connection-editor.*
windowrulev2 = float, class:.*imv.*
windowrulev2 = float, class:.*Calculator.*
windowrulev2 = float, title:.*Picture-in-Picture.*

# Tamaños por defecto para las herramientas cuando floten
windowrulev2 = size 800 600, class:.*pavucontrol.*
windowrulev2 = size 900 700, class:.*blueman-manager.*

# ── Ventanas Flotantes de Utilidades (KDE & Herramientas de Usuario) ──────────
windowrulev2 = float, class:.*org.kde.dolphin.*
windowrulev2 = size 1000 700, class:.*org.kde.dolphin.*
windowrulev2 = center, class:.*org.kde.dolphin.*

windowrulev2 = float, class:.*org.kde.ark.*
windowrulev2 = size 800 600, class:.*org.kde.ark.*
windowrulev2 = center, class:.*org.kde.ark.*

windowrulev2 = float, class:.*org.kde.gwenview.*
windowrulev2 = center, class:.*org.kde.gwenview.*

windowrulev2 = float, class:.*org.kde.kcalc.*
windowrulev2 = center, class:.*org.kde.kcalc.*

windowrulev2 = float, class:.*org.kde.spectacle.*

windowrulev2 = float, class:.*waypaper.*
windowrulev2 = size 900 650, class:.*waypaper.*
windowrulev2 = center, class:.*waypaper.*

# ── Blur en capas (waybar, rofi, notifications) ───────────────────────────────
layerrule = blur, waybar
layerrule = ignorealpha 0, waybar
layerrule = blur, rofi
layerrule = ignorealpha 0, rofi
layerrule = blur, notifications
layerrule = ignorealpha 0.5, notifications
layerrule = blur, wlogout
layerrule = ignorealpha 0.5, wlogout

# ── Distribución de Aplicaciones (Monitor Principal) ─────────────────────────
windowrulev2 = workspace 2, class:.*firefox.*
windowrulev2 = workspace 2, class:.*brave-browser.*
windowrulev2 = workspace 2, class:.*microsoft-edge.*
windowrulev2 = workspace 3, class:.*code.*
windowrulev2 = workspace 4, class:.*dbeaver.*
windowrulev2 = workspace 4, class:.*beekeeper-studio.*
windowrulev2 = workspace 4, class:.*bruno.*
windowrulev2 = workspace 5, class:.*onlyoffice.*

# ── Distribución y Estado Flotante (Monitor Secundario) ───────────────────────
# ZapZap y Spotify se abren en el monitor de la derecha, cambian la pantalla pero no roban el foco
windowrulev2 = workspace 6, class:.*zapzap.*
windowrulev2 = float, class:.*zapzap.*
windowrulev2 = center, class:.*zapzap.*
windowrulev2 = noinitialfocus, class:.*zapzap.*

windowrulev2 = workspace 7, class:.*spotify.*
windowrulev2 = float, class:.*spotify.*
windowrulev2 = center, class:.*spotify.*
windowrulev2 = noinitialfocus, class:.*spotify.*

# Discord, Stremio, VLC y Zoom cambian el foco al monitor secundario al abrirse (sin silent)
windowrulev2 = workspace 6, class:.*discord.*
windowrulev2 = float, class:.*discord.*
windowrulev2 = center, class:.*discord.*

windowrulev2 = workspace 8, class:.*stremio.*
windowrulev2 = float, class:.*stremio.*
windowrulev2 = center, class:.*stremio.*

windowrulev2 = workspace 8, class:.*vlc.*
windowrulev2 = float, class:.*vlc.*
windowrulev2 = center, class:.*vlc.*

windowrulev2 = workspace 9, class:.*zoom.*
windowrulev2 = float, class:.*zoom.*
windowrulev2 = center, class:.*zoom.*

# ── Reglas de Firefox y Kitty ────────────────────────────────────────────────
# Firefox: evitar que el indicador de compartir robe foco
windowrulev2 = noinitialfocus, class:.*firefox.*, title:.*Sharing Indicator.*

# Kitty: sin blur extra (ya es opaco)
windowrulev2 = noblur, class:.*kitty.*
windowrulev2 = float, class:.*floating_kitty.*
windowrulev2 = size 1000 700, class:.*floating_kitty.*
windowrulev2 = center, class:.*floating_kitty.*

# Steam: mantener en workspace dedicado (se abre silencioso)
windowrulev2 = workspace 5 silent, class:.*steam.*

# ── XWayland: escala para apps legacy ────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}
