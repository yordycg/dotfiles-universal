# =============================================================================
# rules.conf — Reglas de Ventanas y Capas
# =============================================================================

# ── Ventanas flotantes por defecto ────────────────────────────────────────────
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(imv)$
windowrule = float, class:^(org.gnome.Calculator)$
windowrule = float, title:^(Picture-in-Picture)$

# ── Tamaños para ventanas flotantes ──────────────────────────────────────────
windowrule = size 800 600, class:^(pavucontrol)$
windowrule = size 900 700, class:^(blueman-manager)$

# ── Blur en capas (mako, waybar, rofi) ───────────────────────────────────────
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, mako
layerrule = ignorezero, mako
layerrule = ignorealpha 0.5, mako

# ── Reglas para apps específicas ──────────────────────────────────────────────
# Firefox: forzar Wayland nativo
windowrule = noinitialfocus, class:^(firefox)$, title:^(Firefox — Sharing Indicator)$

# Kitty: sin blur extra (ya es opaco)
windowrule = noblur, class:^(kitty)$

# Steam: mantener en workspace dedicado
windowrule = workspace 5 silent, class:^(steam)$

# ── XWayland: escala para apps legacy ────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}
