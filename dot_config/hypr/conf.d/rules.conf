# =============================================================================
# rules.conf — Reglas de Ventanas y Capas (Sintaxis Hyprland v0.55.4)
# =============================================================================

# ── Ventanas flotantes por defecto (Herramientas de Sistema) ──────────────────
windowrule = match:class .*pavucontrol.*, float 1
windowrule = match:class .*blueman-manager.*, float 1
windowrule = match:class .*nm-connection-editor.*, float 1
windowrule = match:class .*imv.*, float 1
windowrule = match:class .*Calculator.*, float 1
windowrule = match:title .*Picture-in-Picture.*, float 1

# Tamaños por defecto para las herramientas cuando floten
windowrule = match:class .*pavucontrol.*, size 800 600
windowrule = match:class .*blueman-manager.*, size 900 700

# ── Ventanas Flotantes de Utilidades (KDE & Herramientas de Usuario) ──────────
windowrule = match:class .*org.kde.dolphin.*, float 1
windowrule = match:class .*org.kde.dolphin.*, size 1000 700
windowrule = match:class .*org.kde.dolphin.*, center 1

windowrule = match:class .*org.kde.ark.*, float 1
windowrule = match:class .*org.kde.ark.*, size 800 600
windowrule = match:class .*org.kde.ark.*, center 1

windowrule = match:class .*org.kde.gwenview.*, float 1
windowrule = match:class .*org.kde.gwenview.*, center 1

windowrule = match:class .*org.kde.kcalc.*, float 1
windowrule = match:class .*org.kde.kcalc.*, center 1

windowrule = match:class .*org.kde.spectacle.*, float 1

windowrule = match:class .*waypaper.*, float 1
windowrule = match:class .*waypaper.*, size 900 650
windowrule = match:class .*waypaper.*, center 1

# ── Blur en capas (waybar, rofi, notifications) ───────────────────────────────
layerrule = match:namespace waybar, blur 1
layerrule = match:namespace waybar, ignore_alpha 0
layerrule = match:namespace rofi, blur 1
layerrule = match:namespace rofi, ignore_alpha 0
layerrule = match:namespace notifications, blur 1
layerrule = match:namespace notifications, ignore_alpha 0.5
layerrule = match:namespace wlogout, blur 1
layerrule = match:namespace wlogout, ignore_alpha 0.5

# ── Distribución de Aplicaciones (Monitor Principal) ─────────────────────────
windowrule = match:class .*firefox.*, workspace 2
windowrule = match:class .*brave-browser.*, workspace 2
windowrule = match:class .*microsoft-edge.*, workspace 2
windowrule = match:class .*code.*, workspace 3
windowrule = match:class .*dbeaver.*, workspace 4
windowrule = match:class .*beekeeper-studio.*, workspace 4
windowrule = match:class .*bruno.*, workspace 4
windowrule = match:class .*onlyoffice.*, workspace 5

# ── Distribución y Estado Flotante (Monitor Secundario) ───────────────────────
# ZapZap y Spotify se abren en el monitor de la derecha, cambian la pantalla pero no roban el foco
windowrule = match:class .*zapzap.*, workspace 6
windowrule = match:class .*zapzap.*, float 1
windowrule = match:class .*zapzap.*, center 1
windowrule = match:class .*zapzap.*, no_initial_focus 1

windowrule = match:class .*spotify.*, workspace 7
windowrule = match:class .*spotify.*, float 1
windowrule = match:class .*spotify.*, center 1
windowrule = match:class .*spotify.*, no_initial_focus 1

# Discord, Stremio, VLC y Zoom cambian el foco al monitor secundario al abrirse (sin silent)
windowrule = match:class .*discord.*, workspace 6
windowrule = match:class .*discord.*, float 1
windowrule = match:class .*discord.*, center 1

windowrule = match:class .*stremio.*, workspace 8
windowrule = match:class .*stremio.*, float 1
windowrule = match:class .*stremio.*, center 1

windowrule = match:class .*vlc.*, workspace 8
windowrule = match:class .*vlc.*, float 1
windowrule = match:class .*vlc.*, size 1000 700
windowrule = match:class .*vlc.*, center 1

windowrule = match:class .*zoom.*, workspace 9
windowrule = match:class .*zoom.*, float 1
windowrule = match:class .*zoom.*, center 1

# ── Reglas de Firefox y Kitty ────────────────────────────────────────────────
# Firefox: evitar que el indicador de compartir robe foco
windowrule = match:class .*firefox.*, match:title .*Sharing Indicator.*, no_initial_focus 1

# Kitty: sin blur extra (ya es opaco)
windowrule = match:class .*kitty.*, no_blur 1
windowrule = match:class .*floating_kitty.*, float 1
windowrule = match:class .*floating_kitty.*, size 1000 700
windowrule = match:class .*floating_kitty.*, center 1

# Steam: mantener en workspace dedicado (se abre silencioso)
windowrule = match:class .*steam.*, workspace 5 silent

# ── XWayland: escala para apps legacy ────────────────────────────────────────
xwayland {
    force_zero_scaling = true
}
