# =============================================================================
# keybinds.conf — Atajos de Teclado
# Estilo: compatible con i3/Sway para reducir la curva de aprendizaje
# =============================================================================

$mainMod = SUPER

# ── Aplicaciones ──────────────────────────────────────────────────────────────
bind = $mainMod,       Return,    exec, kitty
bind = $mainMod,       D,         exec, rofi -show drun
bind = $mainMod SHIFT, D,         exec, rofi -show run
bind = $mainMod,       V,         exec, rofi -show clipboard -modi clipboard:~/.local/bin/rofi-clipboard.sh
bind = $mainMod SHIFT, P,         exec, ~/.local/bin/passage-rofi.sh
bind = $mainMod,       E,         exec, thunar
bind = $mainMod,       B,         exec, firefox

# ── Ventanas ──────────────────────────────────────────────────────────────────
bind = $mainMod,       Q,         killactive
bind = $mainMod,       F,         fullscreen, 0
bind = $mainMod SHIFT, F,         fullscreen, 1        # Fullscreen sin bordes
bind = $mainMod,       Space,     exec, qs -c desktop ipc call palette toggle
bind = $mainMod SHIFT, Space,     togglefloating
bind = $mainMod,       P,         pseudo                # Dwindle pseudotile
bind = $mainMod,       J,         layoutmsg, togglesplit           # Dwindle split

# ── Navegación de foco (estilo Vim) ───────────────────────────────────────────
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Alternativa con flechas (Arriba/Abajo para foco vertical, Izquierda/Derecha para monitor)
bind = $mainMod, left,  focusmonitor, -1      # foco → monitor izquierdo (principal)
bind = $mainMod, right, focusmonitor, +1      # foco → monitor derecho
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# ── Mover ventanas ────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, left,  movewindow, mon:-1   # traer ventana a la izquierda (principal)
bind = $mainMod SHIFT, right, movewindow, mon:+1   # empujar ventana a la derecha (secundario)

# ── Redimensionar ventanas ────────────────────────────────────────────────────
binde = $mainMod CTRL, h, resizeactive, -50 0
binde = $mainMod CTRL, l, resizeactive,  50 0
binde = $mainMod CTRL, k, resizeactive,  0 -50
binde = $mainMod CTRL, j, resizeactive,  0  50

# ── Workspaces (1-5: Monitor Principal) ───────────────────────────────────────
bind = $mainMod, 1, exec, ~/.local/bin/hypr-workspace.sh 1
bind = $mainMod, 2, exec, ~/.local/bin/hypr-workspace.sh 2
bind = $mainMod, 3, exec, ~/.local/bin/hypr-workspace.sh 3
bind = $mainMod, 4, exec, ~/.local/bin/hypr-workspace.sh 4
bind = $mainMod, 5, exec, ~/.local/bin/hypr-workspace.sh 5

# Mover ventana al workspace (1-5)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

# ── Workspaces (6-10: Monitor Secundario - 6-0) ───────────────────────────────
bind = $mainMod, 6, exec, ~/.local/bin/hypr-workspace.sh 6
bind = $mainMod, 7, exec, ~/.local/bin/hypr-workspace.sh 7
bind = $mainMod, 8, exec, ~/.local/bin/hypr-workspace.sh 8
bind = $mainMod, 9, exec, ~/.local/bin/hypr-workspace.sh 9
bind = $mainMod, 0, exec, ~/.local/bin/hypr-workspace.sh 10

# Mover ventana al workspace (6-10)
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll sobre waybar para cambiar workspace
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# ── Mover ventana flotante con ratón ─────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = ,         Print,        exec, grim ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png
bind = SHIFT,    Print,        exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print,        exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png

# ── Media / Volumen / Brillo / Controladores Avanzados ────────────────────────
binde = , XF86AudioRaiseVolume,  exec, ~/.local/bin/volume.sh up
binde = , XF86AudioLowerVolume,  exec, ~/.local/bin/volume.sh down
bind  = , XF86AudioMute,         exec, ~/.local/bin/volume.sh mute

bind  = , XF86AudioPlay,         exec, ~/.local/bin/media-control.sh play-pause
bind  = , XF86AudioNext,         exec, ~/.local/bin/media-control.sh next
bind  = , XF86AudioPrev,         exec, ~/.local/bin/media-control.sh previous

binde = , XF86MonBrightnessUp,   exec, ~/.local/bin/brightness.sh up
binde = , XF86MonBrightnessDown, exec, ~/.local/bin/brightness.sh down

# ── Sistema ───────────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, E, exec, ~/.local/bin/logoutlaunch.sh
bind = $mainMod,       L, exec, hyprlock
bind = $mainMod SHIFT, R, exec, hyprctl reload

# ── Wallpaper (cambiar con rofi) ──────────────────────────────────────────────
bind = $mainMod, W, exec, ~/.local/bin/rofi-wallpaper.sh
