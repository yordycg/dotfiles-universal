# =============================================================================
# Hyprland Configuration File
# Creado desde cero - ¡Tu lienzo en blanco!
# Ubicación: ~/.config/hypr/hyprland.conf
# =============================================================================

# ── 1. Monitores ─────────────────────────────────────────────────────────────
# Configuración por defecto: detecta resolución y tasa de refresco automáticamente.
# Para pantallas específicas, usa: monitor = nombre, resolución@tasa, posición, escala
monitor = , preferred, auto, 1


# ── 2. Programas por defecto ──────────────────────────────────────────────────
# Define tus herramientas principales aquí.
$terminal = kitty
$menu     = wofi --show run # Cambia a tu lanzador cuando lo crees


# ── 3. Autostart (Inicio automático) ──────────────────────────────────────────
# Lanza tus daemons y aplicaciones de fondo aquí.
# exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once = waybar


# ── 4. Variables de Entorno ───────────────────────────────────────────────────
# Configuraciones recomendadas para Wayland y temas.
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# Soporte Qt / GTK / Tematizado
env = QT_QPA_PLATFORM, wayland;xcb
env = GDK_BACKEND, wayland,x11
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland


# ── 5. Entrada (Teclado y Ratón) ──────────────────────────────────────────────
input {
    # Distribución del teclado (ej: es, us, latam)
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = false
    }

    sensitivity = 0 # -1.0 a 1.0, 0 significa sin cambios
}


# ── 6. Aspecto Visual y Diseño ────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Colores de bordes activos/inactivos
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle # dwindle o master
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }

    # Sombras (shadow) obsoletas en versiones recientes de Hyprland o configurables así:
    # drop_shadow = true
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)
}


# ── 7. Animaciones ────────────────────────────────────────────────────────────
animations {
    enabled = true

    # Curvas de animación Bezier
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}


# ── 8. Layouts (Configuración de divisiones) ──────────────────────────────────
dwindle {
    pseudotile = true # Habilita SUPER + P
    preserve_split = true # Mantiene la orientación de la división
}

master {
    new_status = master
}


# ── 9. Atajos de Teclado (Keybindings) ────────────────────────────────────────
$mainMod = SUPER

# Acciones de Ventanas e Interfaz
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit, # Cierra Hyprland por completo
bind = $mainMod, V, togglefloat,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Movimiento del Foco de Ventanas (Estilo Vim)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Mover Foco con Flechas de Dirección
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Gestión de Workspaces (Escritorios Virtuales)
# Cambiar al workspace 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Mover ventana activa al workspace 1-10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Desplazarse por workspaces con la rueda del ratón sobre el fondo
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover y redimensionar ventanas flotantes con ratón y $mainMod
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
