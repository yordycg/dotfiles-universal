# Font (Optimizada para Starship Cockpit)
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# Cursor
cursor_shape          block
cursor_blink_interval 0

# Window layout
window_padding_width  8
hide_window_decorations yes
confirm_os_window_close 0
background_opacity    1.0

# Performance & Shell
update_check_interval 0
enable_audio_bell     no
term xterm-256color

# --- Theme (Gruvbox Dark - a juego con Starship/Nvim) ---
foreground            #ebdbb2
background            #282828
selection_foreground  #655b53
selection_background  #ebdbb2
url_color             #d65d0e

# Cursor colors
cursor                #ebdbb2
cursor_text_color     #282828

# black
color0   #282828
color8   #928374
# red
color1   #cc241d
color9   #fb4934
