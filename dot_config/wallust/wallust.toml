# wallust configuration - Senior Implementation
backend = "kmeans"
color_space = "lab"
threshold = 20
filter = "dark16"

[templates]
sway = { template = "sway.wl", target = "~/.config/themes/current/sway" }
kitty = { template = "kitty.wl", target = "~/.config/themes/current/kitty.conf" }
waybar = { template = "waybar.wl", target = "~/.config/themes/current/waybar.css" }
fzf = { template = "fzf.wl", target = "~/.config/themes/current/fzf_colors.sh" }
hyprland = { template = "hyprland.wl", target = "~/.config/themes/current/hyprland.conf" }
mako = { template = "mako.wl", target = "~/.config/themes/current/mako" }
rofi = { template = "rofi.wl", target = "~/.config/themes/current/rofi.rasi" }
quickshell = { template = "quickshell.wl", target = "~/.config/themes/current/quickshell.toml" }
hyprlock = { template = "hyprlock.wl", target = "~/.config/themes/current/hyprlock.conf" }
btop = { template = "btop.wl", target = "~/.config/themes/current/btop.theme" }
tmux = { template = "tmux.wl", target = "~/.config/themes/current/tmux.conf" }
starship = { template = "starship.wl", target = "~/.config/themes/current/starship.toml" }
