# ==============================================================================
# TMUX UNIVERSAL CONFIG
# Fusión: Legacy 2024 + Reset Pro + Dotbar Theme
# ==============================================================================

# --- General Settings & Fixes ---
set -g default-terminal "${TERM}"
set -ga terminal-overrides ",*:RGB"
set -g mouse on
set -g set-clipboard on
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g status-interval 3

# --- Indexing & Naming ---
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename off

# --- Prefix (Ergonómico C-Space) ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Navigation & Management (Rescatado de reset.conf) ---
bind r command-prompt "rename-window %%"
bind R source-file "~/.config/tmux/tmux.conf" \; display-message "Config reloaded..."
bind c new-window -c "#{pane_current_path}"
bind Space last-window
bind b switch-client -l
bind x kill-pane                                 # Cerrar panel sin confirmación
bind-key X command-prompt -p "kill window: " "kill-window -t '%%'"

# Classic Session Selector (Moved to Shift-S to keep 's' for splits)
bind S choose-tree -Zs

# Splits (Vim Style - Keeping your preferred keys)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane Movement (Vim Style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize Panes (Alt + Flechas sin prefijo)
bind -n M-Left resize-pane -L 5
bind -n M-Down resize-pane -D 5
bind -n M-Up resize-pane -U 5
bind -n M-Right resize-pane -R 5

bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r z resize-pane -Z

# Window Navigation (H/L)
bind -r H previous-window
bind -r L next-window

# --- Popups Pro (Alt/Meta Keys - No necesitan prefijo) ---
bind -n M-g display-popup -d "#{pane_current_path}" -xC -yC -w90% -h90% -B -E "lazygit"
bind -n M-y display-popup -d "#{pane_current_path}" -xC -yC -w90% -h90% -B -E "yazi"
bind -n M-t display-popup -d "#{pane_current_path}" -xC -yC -w90% -h90% -B -E 
bind -n M-n new-window -c "#{pane_current_path}"

# --- Image Preview Support ---
set -gg allow-passthrough all
set -g visual-activity off
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# --- Copy Mode (Vim Style) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- Plugin Configuration ---
# Resurrect & Continuum (Persistencia Indestructible)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'

# Theme (Dotbar) Customization
set -g @tmux-dotbar-position top
set -g @tmux-dotbar-bold-current-window true
set -g @tmux-dotbar-ssh-icon-only true
set -g @tmux-dotbar-right false

# --- Auto-install TPM & Plugins ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

# Force SessionX bind to 'o' after TPM loads
bind o run-shell "~/.config/tmux/plugins/tmux-sessionx/scripts/sessionx.sh"
