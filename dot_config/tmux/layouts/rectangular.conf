# ~/.config/tmux/layouts/rectangular.conf
# Layout Rectangular - Estilo Omarchy Clásico (Flat y Rectangular)

# Posición y alineación
set -g status-position top
set -g status-justify left

# Colores generales de la barra (transparente)
set -g status-style "bg=default,fg=default"

# Lado Izquierdo: [Sesión]
# - Bloque rectangular sólido: azul en reposo, acento/rojo al presionar Prefix.
# - Removido el icono para dejarlo 100% fiel al Omarchy original.
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[fg=#{@thm_bg} bg=#{@thm_accent} bold] #S #[bg=default],#[fg=#{@thm_bg} bg=#{@thm_blue} bold] #S #[bg=default]} "

# Lado Derecho: [Modos]
# - Muestra COPY, PREFIX o ZOOM de forma dinámica en color acento/azul.
set -g status-right-length 50
set -g status-right "#[fg=#{@thm_blue}]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}"

# Formato de Ventanas:
# - Sin separadores, solo texto plano plano.
# - Inactiva: Gris y sin fondo.
# - Activa: Azul/Acento en negrita y sin fondo.
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#{@thm_gray}] #I:#W "
setw -g window-status-current-format "#[fg=#{@thm_blue} bold] #I:#W "
