# ~/.config/tmux/layouts/rounded.conf
# Layout Rounded - Pestañas semi-redondeadas con rotación dinámica de colores en insignias

# Posición y alineación (Ventanas a la izquierda)
set -g status-position top
set -g status-justify left

# Colores generales de la barra
set -g status-style "bg=#{@bg0},fg=#{@fg}"

# Limpiar estilos heredados de plugins anteriores para asegurar transparencia
set -g window-status-style "bg=default,fg=#{@fg}"
set -g window-status-current-style "bg=default,fg=#{@fg},bold"
set -g window-status-activity-style "bg=default"
set -g window-status-bell-style "bg=default"

# Estructura del lado Izquierdo: [Sesión]
# - Por defecto: Insignia semi-redondeada azul + Nombre en texto flotante transparente.
# - Con Prefix: Se expande a una cápsula cerrada completamente redondeada en color acento.
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=#{@accent} bg=default]#[bg=#{@accent} fg=#{@bg0} bold] #{@icon_session}  #S #[fg=#{@accent} bg=default],#[fg=#{@blue} bg=default]#[bg=#{@blue} fg=#{@bg0}]#{@icon_session} #[default]  #[fg=#{@blue} bold]#S} "

# Estructura del lado Derecho: [ 󱑎 ] %H:%M
# - Se cambia el fondo del reloj a @blue para mayor contraste con la barra y simetría con la sesión
set -g status-right-length 100
set -g status-right "#[fg=#{@blue} bg=default]#[bg=#{@blue} fg=#{@bg0}]󱑎 #[default] #[fg=#{@fg}]%H:%M "

# Formato de Ventanas:
# - Separador: Espacio amplio
# - Inactiva: Rotación dinámica de fondo para el número (azul, magenta, cian) usando aritmética tmux.
#             Espacio interno únicamente a la derecha del número (#I ).
# - Activa: Insignia de número en color acento con espacio derecho + SSH (izq) + Nombre en negrita + Zoom (der).
setw -g window-status-separator "    "
setw -g window-status-format "#[fg=#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},1},#{@blue},#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},2},#{@purple},#{@aqua}}} bg=default]#[bg=#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},1},#{@blue},#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},2},#{@purple},#{@aqua}}} fg=#{@bg0}]#I #[default] #[fg=#{@fg}]#W"
setw -g window-status-current-format "#[fg=#{@accent} bg=default]#[bg=#{@accent} fg=#{@bg0}]#I #[default]#{?SSH_CONNECTION, #[fg=#{@aqua}]#{@icon_ssh},} #[fg=#{@fg} bold]#W#{?window_zoomed_flag, #[fg=#{@yellow}]#{@icon_zoom},}"

