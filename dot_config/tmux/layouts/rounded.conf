# ~/.config/tmux/layouts/rounded.conf
# Layout Rounded - Pestañas semi-redondeadas con rotación dinámica de colores en insignias

# Posición y alineación (Ventanas a la izquierda)
set -g status-position top
set -g status-justify left

# Colores generales de la barra
set -g status-style "bg=#{@thm_bg},fg=#{@thm_fg}"

# Estructura del lado Izquierdo: [Sesión]
# - Por defecto: Insignia semi-redondeada azul + Nombre en texto flotante transparente.
# - Con Prefix: Se expande a una cápsula cerrada completamente redondeada en color acento.
set -g status-left-length 100
set -g status-left "#{?client_prefix,#[fg=#{@thm_accent} bg=default]#[bg=#{@thm_accent} fg=#{@thm_bg} bold] #{@icon_session}  #S #[fg=#{@thm_accent} bg=default],#[fg=#{@thm_blue} bg=default]#[bg=#{@thm_blue} fg=#{@thm_bg}]#{@icon_session} #[default]  #[fg=#{@thm_blue} bold]#S} "

# Estructura del lado Derecho: [ 󱑎 ] %H:%M
# - Se cambia el fondo del reloj a @thm_blue para mayor contraste con la barra y simetría con la sesión
set -g status-right-length 100
set -g status-right "#[fg=#{@thm_blue} bg=default]#[bg=#{@thm_blue} fg=#{@thm_bg}]󱑎 #[default] #[fg=#{@thm_fg}]%H:%M "

# Formato de Ventanas:
# - Separador: Espacio amplio
# - Inactiva: Rotación dinámica de fondo para el número (azul, magenta, cian) usando aritmética tmux.
#             Espacio interno únicamente a la derecha del número (#I ).
# - Activa: Insignia de número en color acento con espacio derecho + SSH (izq) + Nombre en negrita + Zoom (der).
setw -g window-status-separator "    "
setw -g window-status-format "#[fg=#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},1},#{@thm_blue},#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},2},#{@thm_magenta},#{@thm_cyan}}} bg=default]#[bg=#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},1},#{@thm_blue},#{?#{==:#{e|-:#I,#{e|*:3,#{e|/:#I,3}}},2},#{@thm_magenta},#{@thm_cyan}}} fg=#{@thm_bg}]#I #[default] #[fg=#{@thm_fg}]#W"
setw -g window-status-current-format "#[fg=#{@thm_accent} bg=default]#[bg=#{@thm_accent} fg=#{@thm_bg}]#I #[default]#{?SSH_CONNECTION, #[fg=#{@thm_cyan}]#{@icon_ssh},} #[fg=#{@thm_fg} bold]#W#{?window_zoomed_flag, #[fg=#{@thm_yellow}]#{@icon_zoom},}"
