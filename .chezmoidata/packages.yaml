# Matriz global de paquetes curada para la filosofía Clean Host.
# Estructurada por distribución para evitar fallos de nomenclatura en los gestores de paquetes.

fedora:
  base:
    - tailscale
    - age
    - git
    - curl
    - wget
    - tmux
    - zsh
    - jq
    - pwgen
  dev_headers:
    - gcc
    - gcc-c++
    - make
    - cmake
    - pkgconfig
    - aquamarine-devel
    - hyprlang-devel
    - hyprutils-devel
    - hyprwayland-scanner
    - openssl-devel
    - readline-devel
    - sqlite-devel
  system_tools:
    - gnupg2
    - pinentry
    - gh
    - fzf
    - unzip
    - sqlite
    - fastfetch
  desktop_gui:
    - distrobox
    - podman
    - podman-compose
    - flatpak
    - kitty
    - qt5ct
    - qt6ct
    - kvantum
  hyprland:
    - hyprland
    - hyprpaper
    - hyprlock
    - hypridle
    - hyprpicker
    - hyprsunset
    - hyprpolkitagent
    - xdg-desktop-portal-hyprland
    - waybar
    - rofi-wayland
    - grim
    - slurp
    - wl-clipboard
    - cliphist
    - brightnessctl
    - pavucontrol
    - mate-polkit
    - papirus-icon-theme
    - imv
    - wlogout
    - quickshell
    - SwayNotificationCenter
    - awww
    - thunar
    - udiskie
    - code

