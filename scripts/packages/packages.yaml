# Estructura de paquetes organizada por Distribución
# Evita conflictos de nombres entre gestores de paquetes (dnf vs apt)
# Responsabilidad: entorno de trabajo del desarrollador únicamente.
# Infraestructura del servidor (Docker, etc.) → homelab-infra/

fedora:
  base:
    - tailscale
    - age
    - git
    - curl
    - wget
    - tmux
    - zsh
    - jq
    - pwgen

  dev_toolchain:
    - gcc
    - gcc-c++
    - make
    - openssl-devel
    - zlib-devel
    - bzip2-devel
    - readline-devel
    - sqlite-devel
    - llvm-devel
    - ncurses-devel
    - xz-devel
    - libffi-devel

  terminal_ux:
    - gnupg2
    - pinentry
    - gh
    - fzf
    - mosh
    - unzip
    - sqlite

  desktop:
    - distrobox
    - podman
    - podman-compose
    - snapper
    - python3-dnf-plugin-snapper
    - flatpak
    - ostree
    - appstream-compose
    - gnome-disk-utility
    - fontconfig
    - google-chrome-stable
    - firefox
    - code
    - gnome-keyring
    - libsecret
    - nwg-look
    - qt5ct
    - qt6ct
    - kvantum
    - qt5-qtstyleplugins
    - qt6-qtdeclarative
    - qt6-qtsvg
    - qt6-qtquickcontrols2
    - qt6-qt5compat
    - qt6-qtvirtualkeyboard
    - qt6-qtmultimedia
    - kitty

  sway:
    - waybar
    - rofi-wayland
    - cliphist
    - mate-polkit
    - ImageMagick
    - mako
    - imv
    - grim
    - slurp
    - wl-clipboard
    - brightnessctl
    - pavucontrol
    - nm-connection-editor
    - blueman
    - pulseaudio-utils
    - papirus-icon-theme
    - gammastep
    - kanshi
    - swayidle
    - swaylock
    - swww
    - waypaper

  hyprland:
    # ── Compositor y ecosistema Hypr (via COPR solopasha/hyprland) ──
    - hyprland
    - hyprpaper
    - hyprlock
    - hypridle
    - hyprpicker
    - hyprsunset
    - hyprpolkitagent
    - xdg-desktop-portal-hyprland
    # ── Wayland / Qt (nombres correctos en Fedora) ──
    - qt5-qtwayland
    - qt6-qtwayland
    # ── Herramientas Wayland compartidas ──
    - waybar
    - rofi-wayland
    - mako
    - grim
    - slurp
    - wl-clipboard
    - cliphist
    - swww
    - brightnessctl
    - pavucontrol
    - mate-polkit
    - papirus-icon-theme
    - imv
    - quickshell

  kde:
    # Core
    - plasma-desktop
    - plasma-workspace
    # Integración del Sistema (Audio, Red, Energía, Monitores, BT, GTK)
    - plasma-nm
    - plasma-pa
    - powerdevil
    - kscreen
    - bluedevil
    - kde-gtk-config
    # Theming Qt / Kvantum
    - qt5ct
    # Utilidades de Escritorio indispensables (Visores, Exploradores, Capturadoras)
    # - konsole
    - dolphin
    - spectacle
    - ark
    - gwenview
    - okular
    - kate
    - kcalc
    - plasma-systemmonitor
    - plasma-discover
    - korganizer
    # Dependencias para los scripts de instalación de temas (Compilación)
    - sassc
    - glib2-devel
    - ImageMagick
    - dialog
    - optipng
    - inkscape
    # Hardware y soporte adicional
    - blueman
    - gvfs-mtp
    - libmtp
    - gamemode
    - xpadneo
    # Soporte de Impresión
    - cups
    - system-config-printer
    # Codecs Multimedia
    - ffmpeg
    - ffmpeg-libs
    - gstreamer1-plugins-bad-free
    - gstreamer1-plugins-good
    - gstreamer1-plugins-base
    - gstreamer1-plugin-openh264
    - gstreamer1-libav
    # Fuentes del Sistema
    - adobe-source-code-pro-fonts
    - google-noto-sans-fonts
    - google-noto-color-emoji-fonts

