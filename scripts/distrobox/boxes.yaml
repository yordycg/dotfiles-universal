# Definición de contenedores Distrobox para desarrollo local (Plan B)
# Este archivo es la fuente de verdad para tus entornos aislados.

boxes:
  - name: dev-node
    image: docker.io/library/node:22-bookworm
    packages: "git curl wget zsh" # Paquetes básicos dentro de la box
    provision: scripts/distrobox/provision_node.sh

  - name: dev-dotnet
    image: mcr.microsoft.com/dotnet/sdk:9.0
    packages: "git curl wget zsh"
    provision: scripts/distrobox/provision_dotnet.sh

  - name: dev-python
    image: docker.io/library/python:3.12-slim
    packages: "git curl wget zsh"
    provision: scripts/distrobox/provision_python.sh
